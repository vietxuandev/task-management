services:
  app:
    image: ${DOCKER_IMAGE:-ghcr.io/vietxuandev/task-management:latest}
    container_name: task-management
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - TZ=${TIMEZONE:-Asia/Ho_Chi_Minh}

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"
